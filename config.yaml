# ============================================================================
# Default configuration for the Polymarket copy-signal tester.
#
# These are ONLY used to seed the very first `config_history` row the first
# time the poller runs against an empty database. After that, the database is
# the source of truth and the dashboard's settings editor writes new
# (forward-only) config rows. Editing this file does NOT change a running
# deployment's behaviour unless the config_history table is empty.
#
# See README -> "Configuration is forward-only".
# ============================================================================

# --- cohort / leaderboard ---------------------------------------------------
top_n: 50                      # the cohort size: this many ELIGIBLE earners drive the signals
candidate_pool: 400            # screen up to this many top earners (across all 8 DAY/WEEK/MONTH/ALL × PNL/VOL
                               # leaderboard slices) down to top_n that pass the cohort-quality filter. The
                               # leaderboard caps each slice at 50, so a bigger pool = more wallets that clear
                               # the 65%/$10k bar (this is the real lever for getting the cohort up toward 50).
leaderboard_window: MONTH      # DAY | WEEK | MONTH | ALL  (MONTH = the 30-day "monthly winners")
size_threshold: 1              # ignore dust: a wallet must hold at least this position size to count

# How often the poller actually does work. The GitHub Action wakes every 5 min;
# it only fetches + commits once this many minutes have elapsed. 5 | 10 | 15 | 30.
# (Repo is public => unlimited Actions minutes; faster = more frequent commits.)
# 10 = act on every Worker full-scan poke (was 15, which skipped pokes => ~20-min
# effective cadence and slow consensus DETECTION). Price exits run every MINUTE in
# the Worker regardless of this; this only paces the heavy cohort/consensus scan.
poll_interval_minutes: 10

# --- tiering (overlap -> tier) ----------------------------------------------
# overlap = how many of the top N earners independently hold the SAME position
# (same market + same outcome). The dashboard also shows overlap / "participants"
# (how many hold ANY side of that market), e.g. 4/5 = strong conviction.
# Tiers below are based on the ABSOLUTE overlap count, tuned for a 50-earner
# cohort so paper trades stay selective (blue=3 of 50 would open 100+ trades/cycle).
tier_green_min: 10             # overlap >= this  => "green"  — used as the FLOOR when proportional is on
tier_blue_min: 5               # overlap >= this  => "blue"   — used as the FLOOR when proportional is on
# Proportional tiers: scale the agreement bar to the ACTUAL eligible cohort size so it
# stays correctly sized whether the cohort lands at 30 or 50 (the leaderboard can't
# always supply 50 wallets that clear the 65% bar). Anchored so a 50-cohort reproduces
# the original 5/10. Set either to 0 to fall back to the absolute tier_*_min above.
tier_green_frac: 0.20          # green overlap >= round(0.20 × eligible cohort)  (50→10, 40→8, 30→6)
tier_blue_frac: 0.10           # blue  overlap >= round(0.10 × eligible cohort)  (50→5,  40→4, 30→3)

# --- guardrails before a signal becomes a paper trade -----------------------
min_liquidity: 1000            # USD; don't simulate filling a market we couldn't actually trade
min_entry_price: 0.05          # skip deep longshots (e.g. 0.001): spread ~= the whole price, untradeable
                               # noise; also the price floor for the stop. (mirror of max_entry_price)
max_entry_price: 0.85          # skip positions already near resolution (little upside left; +11% cap at 0.90 = bad R/R)
min_resolve_hours: 2           # only skip markets resolving within this many hours (almost-over games).
                               # Kept low on purpose: we scalp sentiment + exit when holders sell. 0=off
min_tier_to_trade: blue        # 'blue' (trade blue+green) or 'green' (trade green only)

# --- paper-trade mechanics --------------------------------------------------
stake_usd: 100                 # fixed $ stake per simulated trade
price_source: realistic        # 'realistic' = enter at the ask, exit at the bid (real spread cost,
                               # so P&L isn't optimistic); 'midpoint' = mid of bid/ask; 'buy' = ask both ways
control_respects_guardrails: true   # apply liquidity + max_entry to the #1-copy control too,
                                    # so the only difference vs overlap is the SELECTION rule

# --- exit + conflict rules --------------------------------------------------
stop_loss_pct: 0.30             # WIDE backstop only — the holder-exit (sell when the cohort sells) is the
                                # real risk control; a tight % just whipsaws on prediction-market noise. 0=off.
                                # (was 0.15) — close a trade if it falls this fraction below entry,
                                # 0.25 = exit at -25% (default). (Prices are 0..1, so a "stop" is a % of entry.)

# --- fast price-based exits (run EVERY MINUTE in the Worker, not just the 10-min scan) ---
# These exist to stop a position cratering 50%+ between scans, and to bank gains
# before they round-trip. All OVERLAP-ONLY — the control benchmark stays naive.
take_profit_pct: 0.0            # bank a defined gain (>= +X%); 0 = off (let winners run to the trailing stop)
trailing_stop_pct: 0.15         # once armed, exit if price gives back this much from its peak. 0 = off
trailing_arm_pct: 0.20          # only arm the trailing stop after the trade is up at least this much (so it
                                # locks PROFIT, doesn't act as a tight stop on entry noise)
time_stop_minutes: 30           # force-exit this many minutes before resolution — never hold a short-fuse
                                # (sports) market into the 0/1 gap. 0 = off
fast_exit_slippage_pct: 0.02    # extra haircut applied to a PANIC sell (stop/trailing) — the book is thin on
                                # the way down, so a fast exit fills worse than the touch bid. Keeps P&L honest.
contested_policy: both          # cohort split on a market (both sides held): 'both' = trade both
                                # (box spreads / hedges are a real strategy worth testing); 'dominant'
                                # = only the stronger side (ties -> higher holder 30d P&L); 'skip' = none

# --- cohort quality (which top earners actually count toward a signal) ------
min_holder_value: 10000         # a cohort member must hold at least this much (USD) in OPEN
                                # positions to count toward overlap — filters cashed-out whales
                                # (e.g. a #1 earner with $10 on the table) and inactive traders.
min_holder_win_ratio: 0.60      # ...and at least this fraction of their open positions must be
                                # in profit right now (0 = off). Tightens the cohort to active winners.
                                # (was 0.65 — relaxed to 0.60 to admit more wallets: the leaderboard
                                # universe is ~225 and 0.65 only cleared ~30; ~75 fail only this bar.)

# --- cohort stability (hysteresis) ------------------------------------------
cohort_grace_hours: 48          # once a wallet qualifies, keep it in the cohort this many hours through
                                # transient dips (win-ratio wobble, a day off the DAY board) as long as it
                                # stays active + funded. Stops the cohort SET churning 30<->50 each cycle.
                                # Entry is immediate; only EXIT is sticky. 0 = off (revert to per-cycle).
