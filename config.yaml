# ============================================================================
# Default configuration for the Polymarket copy-signal tester.
#
# These are ONLY used to seed the very first `config_history` row the first
# time the poller runs against an empty database. After that, the database is
# the source of truth and the dashboard's settings editor writes new
# (forward-only) config rows. Editing this file does NOT change a running
# deployment's behaviour unless the config_history table is empty.
#
# See README -> "Configuration is forward-only".
# ============================================================================

# --- cohort / leaderboard ---------------------------------------------------
top_n: 50                      # watch the top N earners on the profit leaderboard (API max 50)
leaderboard_window: MONTH      # DAY | WEEK | MONTH | ALL  (MONTH = the 30-day "monthly winners")
size_threshold: 1              # ignore dust: a wallet must hold at least this position size to count

# How often the poller actually does work. The GitHub Action wakes every 5 min;
# it only fetches + commits once this many minutes have elapsed. 5 | 10 | 15 | 30.
# (Repo is public => unlimited Actions minutes; faster = more frequent commits.)
poll_interval_minutes: 15

# --- tiering (overlap -> tier) ----------------------------------------------
# overlap = how many of the top N earners independently hold the SAME position
# (same market + same outcome). The dashboard also shows overlap / "participants"
# (how many hold ANY side of that market), e.g. 4/5 = strong conviction.
# Tiers below are based on the ABSOLUTE overlap count, tuned for a 50-earner
# cohort so paper trades stay selective (blue=3 of 50 would open 100+ trades/cycle).
tier_green_min: 10             # overlap >= this  => "green"  (strong: 10+ of 50 agree)
tier_blue_min: 5               # overlap >= this  => "blue"   (moderate: 5+ of 50 agree)

# --- guardrails before a signal becomes a paper trade -----------------------
min_liquidity: 1000            # USD; don't simulate filling a market we couldn't actually trade
max_entry_price: 0.90          # skip positions already near resolution (little upside left)
min_tier_to_trade: blue        # 'blue' (trade blue+green) or 'green' (trade green only)

# --- paper-trade mechanics --------------------------------------------------
stake_usd: 100                 # fixed $ stake per simulated trade
price_source: midpoint         # 'midpoint' (mid of bid/ask) or 'buy' (best ask you'd pay)
control_respects_guardrails: true   # apply liquidity + max_entry to the #1-copy control too,
                                    # so the only difference vs overlap is the SELECTION rule

# --- exit + conflict rules --------------------------------------------------
stop_loss_pct: 0                # close a trade if it falls this fraction below entry. 0 = off,
                                # 0.5 = exit at -50%. (Prices are 0..1, so a "stop" is a % of entry.)
contested_policy: both          # cohort split on a market (both sides held): 'both' = trade both
                                # (box spreads / hedges are a real strategy worth testing); 'dominant'
                                # = only the stronger side (ties -> higher holder 30d P&L); 'skip' = none
