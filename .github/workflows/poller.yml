name: poller

# Read-only Polymarket copy-signal poller. Runs on a schedule, writes its
# results to JSON files in the repo (no database), and commits them back.
# GitHub Pages (serving /docs on main) redeploys automatically on each push.
on:
  schedule:
    # Wake every 5 min; the poller itself only works once `poll_interval_minutes`
    # has elapsed (configurable 5/10/15/30). Public repo => unlimited Actions minutes.
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (hit Polymarket live, commit nothing)"
        type: boolean
        default: false

# Never let two cycles overlap (a slow run + the next tick); avoids push races.
concurrency:
  group: poller
  cancel-in-progress: false

permissions:
  contents: write   # the poller commits updated data/ and docs/ back to the repo

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: poller/requirements.txt

      - name: Install poller deps (minimal)
        run: pip install -r poller/requirements.txt

      - name: Run poller
        env:
          # If these secrets are set the poller uses Supabase instead of files;
          # left empty (the default) it uses the free file-based store.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python -m poller.main --dry-run
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python -m poller.main --force   # manual run always works, ignoring the interval gate
          else
            python -m poller.main           # scheduled: gated by poll_interval_minutes
          fi

      - name: Commit updated data & dashboard
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs
          if git diff --cached --quiet; then
            echo "No data changes this cycle."
          else
            git commit -m "poll: update data & dashboard [skip ci]"
            git push
          fi
