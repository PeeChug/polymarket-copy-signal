name = "polymarket-copy-signal"
main = "worker.js"
compatibility_date = "2024-11-01"

# Two cadences (standard 5-field cron, UTC):
#   "*/5 * * * *" → heavy GitHub full scan / BUY cadence (must match FULL_SCAN_CRON in worker.js)
#   "* * * * *"   → light fast price-mark / SELL cadence (re-prices open paper trades, writes marks.json)
# At minute 0/5/10… both fire as separate scheduled invocations; worker.js
# branches on event.cron. Both fit the Worker free tier.
[triggers]
crons = ["*/5 * * * *", "* * * * *"]
